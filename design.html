<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a0f08">
<title>СЕМЬЯ · как играем</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:ital,wght@0,600;0,700;0,800;0,900;1,700&family=Manrope:wght@500;600;700;800&family=Space+Mono:wght@400;700&display=swap">
<style>
:root{
  --gold:#FFC24B; --gold-lite:#FFE39A; --gold-deep:#D6891C; --gold-ink:#3A2408;
  --wood:#3A2617; --wood2:#4E3220; --wood-hi:#654327; --wood-dk:#241610;
  --crimson:#E23B3B; --crimson-neon:#FF4D4D; --blue:#49B6F0; --violet:#B466F0; --green:#5BC66A; --orange:#F0872E; --pink:#FF57A5;
  --cream:#F7E9C9; --cream2:#EAD5A6; --ink-paper:#3A2A16;
  --paper:#FFF6DF; --txt:#F6EACB; --txt-2:#DBC08C; --txt-3:#B0925E;
  --disp:"Russo One","Rubik",sans-serif;
  --panel:#2A1B10; --panel-2:#38230f; --line:#5A3C22; --line-2:#7A5230;
  --gold-grad:linear-gradient(180deg,var(--gold-lite) 0%,var(--gold) 44%,var(--gold-deep) 100%);
  --wood-grad:linear-gradient(180deg,var(--wood-hi),var(--wood2) 60%,var(--wood));
  --r:18px;
  --sh-btn:0 4px 0 rgba(0,0,0,.35), 0 8px 18px rgba(0,0,0,.4), inset 0 2px 0 rgba(255,255,255,.4), inset 0 -3px 0 rgba(0,0,0,.25);
  --sh-card:0 10px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14);
}
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
html{ background:#1a0f08; -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body{
  font-family:"Manrope",system-ui,sans-serif; font-size:15.5px; line-height:1.55; color:var(--txt);
  background:
    radial-gradient(120% 70% at 50% -6%, rgba(73,182,240,.10), transparent 55%),
    radial-gradient(90% 60% at 88% 8%, rgba(255,77,77,.10), transparent 55%),
    linear-gradient(180deg, #2b1a0f 0%, #21140b 40%, #1a0f08 100%) fixed;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden; -webkit-tap-highlight-color:transparent;
}
body::before{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:url("assets/tex-kraft.png") center/620px; opacity:.10; mix-blend-mode:overlay; }
::-webkit-scrollbar{ height:9px; width:9px; } ::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:9px; }
img{ max-width:100%; display:block; }
.wrap{ position:relative; z-index:1; max-width:1120px; margin:0 auto; padding:0 16px 96px; }

/* ── Шапка ── */
header.hero{ text-align:center; padding:38px 12px 10px; position:relative; }
.hero__eyebrow{ display:inline-block; font:800 11px/1 "Rubik"; letter-spacing:.28em; text-transform:uppercase; color:#FFDA8A;
  padding:6px 14px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid var(--line-2);
  text-shadow:0 0 10px rgba(255,190,90,.6); box-shadow:0 0 20px rgba(255,190,90,.18); }
.hero__title{ margin:16px 0 4px; font:400 clamp(44px,10vw,88px)/0.98 var(--disp); letter-spacing:.02em;
  color:var(--gold); -webkit-text-stroke:3px var(--gold-ink);
  text-shadow:0 5px 0 var(--gold-ink), 0 7px 12px rgba(0,0,0,.6), 0 0 34px rgba(255,190,74,.4);
  paint-order:stroke fill; }
.hero__sub{ font:700 15px/1.5 "Rubik"; color:var(--paper); max-width:600px; margin:8px auto 0; }
.hero__neon{ margin-top:14px; display:inline-block; font:900 16px/1 "Rubik"; letter-spacing:.12em; text-transform:uppercase;
  color:#FF6B6B; padding:9px 20px; border:2px solid #FF4D4D; border-radius:12px;
  text-shadow:0 0 8px #FF4D4D, 0 0 18px rgba(255,77,77,.6); box-shadow:0 0 16px rgba(255,77,77,.5), inset 0 0 14px rgba(255,77,77,.28); }

/* ── Табы = глянцевые кнопки ── */
.tabs{ position:sticky; top:0; z-index:30; display:flex; gap:9px; overflow-x:auto; padding:14px 4px; margin:14px -4px 20px;
  background:linear-gradient(180deg,#1a0f08 62%,rgba(26,15,8,0)); scrollbar-width:none; }
.tabs::-webkit-scrollbar{ display:none; }
.tab{ flex:0 0 auto; cursor:pointer; border:0; border-radius:14px; padding:11px 16px; white-space:nowrap;
  font:800 13.5px/1 "Rubik"; text-transform:uppercase; letter-spacing:.03em; color:var(--paper);
  background:var(--wood-grad); box-shadow:var(--sh-btn); transition:transform .1s, filter .12s;
  display:inline-flex; align-items:center; gap:8px; text-shadow:0 1px 2px rgba(0,0,0,.5); }
.tab .ic{ font-size:16px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
.tab:hover{ filter:brightness(1.08); }
.tab:active{ transform:translateY(2px); }
.tab.on{ background:var(--gold-grad); color:var(--gold-ink); text-shadow:0 1px 0 rgba(255,255,255,.4);
  box-shadow:0 4px 0 var(--gold-deep), 0 9px 20px rgba(255,170,60,.4), inset 0 2px 0 rgba(255,255,255,.6); }

section.panel{ display:none; animation:in .32s cubic-bezier(.22,.61,.36,1); }
section.panel.on{ display:block; }
@keyframes in{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none; } }

/* ── Заголовки секций ── */
.sh{ display:flex; align-items:center; gap:11px; margin:32px 2px 15px; font:400 18px/1.1 var(--disp); text-transform:uppercase; letter-spacing:.02em;
  color:#FFD873; text-shadow:0 2px 0 var(--gold-ink), 0 3px 6px rgba(0,0,0,.5), 0 0 18px rgba(255,190,74,.35); }
.sh::before{ content:""; width:16px; height:16px; flex:0 0 auto; border-radius:4px; transform:rotate(45deg);
  background:var(--gold-grad); box-shadow:0 0 14px rgba(255,190,74,.6), inset 0 1px 0 rgba(255,255,255,.5); }
.sh .f{ flex:1; height:3px; border-radius:3px; background:linear-gradient(90deg,var(--gold-deep),transparent); opacity:.6; }
.lead{ font:600 16.5px/1.6 "Manrope"; color:var(--txt); max-width:800px; margin:0 0 4px; }
.lead b{ color:var(--paper); }

/* ── Сетки/карточки ── */
.grid{ display:grid; gap:15px; }
.g2{ grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); }
.g3{ grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); }
.card{ position:relative; background:var(--wood-grad); border:1px solid var(--line-2); border-radius:var(--r);
  box-shadow:var(--sh-card); padding:16px 17px; overflow:hidden; }
.card::after{ content:""; position:absolute; inset:0 0 auto 0; height:40%; pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.08),transparent); }
.card>*{ position:relative; }
.card h4{ margin:0 0 6px; font:400 15.5px/1.25 var(--disp); color:#FFEFC6; text-shadow:0 1px 2px rgba(0,0,0,.5); letter-spacing:.01em; }
.card p{ margin:0; color:var(--txt); font-size:14.5px; }
/* пергамент */
.card--paper{ background:linear-gradient(180deg,var(--cream),var(--cream2)); color:var(--ink-paper); border:2px solid var(--gold-deep); }
.card--paper::after{ display:none; }
.card--paper h4{ color:#4A3312; } .card--paper p{ color:#5A4222; }
.card--paper::before{ content:""; position:absolute; inset:5px; border:2px dashed rgba(120,80,30,.4); border-radius:12px; pointer-events:none; }
.card--gold{ background:var(--gold-grad); color:var(--gold-ink); border:0; box-shadow:0 8px 22px rgba(255,170,60,.35), inset 0 2px 0 rgba(255,255,255,.5); }
.card--gold h4{ color:var(--gold-ink); } .card--gold p{ color:#5A3A0C; }
.tagrow{ display:flex; align-items:center; gap:8px; font:800 10px/1 "Rubik"; letter-spacing:.13em; text-transform:uppercase; color:#FFD98A; margin-bottom:9px; }
.card--paper .tagrow{ color:var(--gold-deep); }
.kv{ display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; }
.pill{ font:700 11.5px/1 "Space Mono"; padding:6px 11px; border-radius:999px; background:rgba(0,0,0,.28); border:1px solid var(--line-2); color:#FFD98A; }
.pill.green{ color:#8CE59A; border-color:#2f6b39; background:rgba(40,90,50,.3); }
.pill.rose{ color:#FF9E9E; border-color:#7a3030; background:rgba(120,40,40,.28); }
.pill.blue{ color:#A8E0FF; border-color:#2e5c7a; }
.picn{ width:30px; height:30px; object-fit:contain; flex:0 0 auto; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); }

/* ── Ресурс-карта с иконкой ── */
.resc{ display:flex; gap:14px; align-items:flex-start; }
.resc__ic{ width:56px; height:56px; flex:0 0 auto; border-radius:14px; background:radial-gradient(circle at 50% 35%, rgba(255,210,120,.22), rgba(0,0,0,.2));
  display:grid; place-items:center; border:1px solid var(--line-2); box-shadow:inset 0 1px 0 rgba(255,255,255,.15); }
.resc__ic img{ width:42px; height:42px; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,.55)); }

/* ── Таблицы ── */
.tbl-wrap{ overflow-x:auto; border:1px solid var(--line-2); border-radius:14px; margin:6px 0 4px; box-shadow:var(--sh-card); }
table{ border-collapse:collapse; width:100%; font-size:13.8px; min-width:440px; background:var(--wood2); }
caption{ text-align:left; font:800 13px/1 "Rubik"; text-transform:uppercase; letter-spacing:.05em; color:#FFD98A; padding:12px 13px 5px; background:var(--wood2); }
th,td{ text-align:left; padding:10px 13px; border-bottom:1px solid var(--line); vertical-align:top; }
th{ background:var(--wood-hi); color:var(--gold-ink); font:800 11px/1.2 "Rubik"; text-transform:uppercase; letter-spacing:.04em; }
th{ background:var(--gold-grad); }
td{ color:var(--txt); } td:first-child{ color:var(--paper); font-weight:700; }
tr:last-child td{ border-bottom:0; } tbody tr:nth-child(even) td{ background:rgba(0,0,0,.14); }

/* ── Таймлайн ── */
.tl{ position:relative; margin:8px 0 0; }
.tl__row{ position:relative; display:flex; gap:15px; padding:0 0 20px 30px; }
.tl__row::before{ content:""; position:absolute; left:12px; top:6px; bottom:-4px; width:3px; border-radius:3px; background:linear-gradient(180deg,var(--gold),var(--line)); }
.tl__row:last-child::before{ display:none; }
.tl__dot{ position:absolute; left:0; top:0; width:26px; height:26px; border-radius:50%; background:var(--gold-grad); color:var(--gold-ink);
  display:grid; place-items:center; font:800 12px/1 "Space Mono"; box-shadow:0 3px 8px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.5); }
.tl__b{ flex:1; padding-top:1px; } .tl__b b{ display:block; font:800 15.5px/1.3 "Rubik"; color:#FFF0CE; margin-bottom:2px; } .tl__b span{ color:var(--txt); font-size:14.5px; }

/* ── Доска-петля ── */
.boardwrap{ display:flex; justify-content:center; margin:8px 0 12px; }
.board{ display:grid; gap:6px; width:100%; max-width:680px; aspect-ratio:1/1; padding:12px; border-radius:22px;
  background:var(--wood-grad); border:2px solid var(--line-2); box-shadow:var(--sh-card), 0 0 40px rgba(0,0,0,.4); }
.btile{ position:relative; border-radius:12px; padding:3px; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:1px;
  background:linear-gradient(180deg,#2c1c10,#1c110a); border:1px solid var(--line); text-align:center; overflow:hidden; box-shadow:inset 0 1px 0 rgba(255,255,255,.08); }
.btile .bn{ font:800 8px/1.02 "Rubik"; text-transform:uppercase; color:var(--paper); padding:0 1px 2px;
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.btile .bnum{ position:absolute; top:2px; left:4px; font:700 7px/1 "Space Mono"; color:var(--txt-3); z-index:2; }
.btile .bart{ width:100%; height:60%; object-fit:contain; margin-top:8px; filter:drop-shadow(0 3px 3px rgba(0,0,0,.5)); }
.btile .bic{ font-size:17px; line-height:1; margin:auto 0 3px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.6)); }
.btile.special{ background:linear-gradient(180deg,var(--wood-hi),var(--wood-dk)); border-color:var(--line-2); }
.btile.start{ background:var(--gold-grad); } .btile.start .bn{ color:var(--gold-ink); } .btile.start .bnum{ color:#7a5416; }
.btile[data-g]{ border:2px solid var(--gc); box-shadow:0 0 12px -2px var(--gc), inset 0 1px 0 rgba(255,255,255,.08); }
.board__center{ grid-row:2 / -2; grid-column:2 / -2; display:grid; place-items:center; text-align:center; gap:6px;
  border:2px dashed var(--line-2); border-radius:16px; background:radial-gradient(120% 120% at 50% 25%, rgba(73,182,240,.08), transparent 60%); padding:14px; }
.board__center img{ width:min(46%,120px); filter:drop-shadow(0 6px 12px rgba(0,0,0,.5)); }
.board__center .bc-t{ font:400 clamp(20px,4vw,30px)/1 var(--disp); color:var(--gold); -webkit-text-stroke:2px var(--gold-ink); paint-order:stroke fill; text-shadow:0 3px 0 var(--gold-ink); }
.board__center .bc-s{ font:600 italic 12.5px/1.4 "Rubik"; color:var(--txt); max-width:280px; }
.legend{ display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; margin:12px 0 2px; font:700 12px/1 "Manrope"; }
.legend b{ display:inline-flex; align-items:center; gap:6px; font-weight:700; color:var(--txt); }
.legend i{ width:14px; height:14px; border-radius:4px; box-shadow:0 0 8px -1px currentColor; }

/* ── Списки/лут ── */
.loot{ list-style:none; margin:9px 0 0; padding:0; display:flex; flex-direction:column; gap:7px; }
.loot li{ display:flex; gap:9px; align-items:flex-start; font-size:14px; color:var(--txt); }
.loot li::before{ content:"◆"; color:var(--gold); font-size:10px; margin-top:4px; filter:drop-shadow(0 0 4px rgba(255,190,74,.5)); }
.chest{ border-radius:16px; padding:16px 17px; border:2px solid; box-shadow:var(--sh-card); }
.chest.bronze{ border-color:#B4783C; background:linear-gradient(180deg,#3a2612,#251708); }
.chest.silver{ border-color:#BFC8D7; background:linear-gradient(180deg,#2b3038,#191d24); }
.chest.gold{ border-color:var(--gold); background:linear-gradient(180deg,#3a2c10,#241806); box-shadow:var(--sh-card),0 0 28px rgba(255,190,74,.22); }
.chest h4{ display:flex; align-items:center; gap:9px; font-size:17px; }

/* ── Степперы (сборка протокола) ── */
.proto-list{ display:grid; gap:11px; }
.proto-item{ display:flex; align-items:center; gap:13px; background:var(--cream); border-radius:14px; padding:11px 13px; border:2px solid var(--gold-deep); box-shadow:var(--sh-card); }
.proto-item img.picn{ width:34px; height:34px; }
.proto-item .pi-t{ flex:1; } .proto-item .pi-t b{ display:block; font:800 15px/1.2 "Rubik"; color:#4A3312; } .proto-item .pi-t span{ font-size:12.5px; color:#6a4f28; }
.stepper{ display:inline-flex; align-items:center; gap:0; border-radius:11px; overflow:hidden; box-shadow:var(--sh-btn); flex:0 0 auto; }
.stepper button{ width:34px; height:34px; border:0; cursor:pointer; font:800 20px/1 "Rubik"; color:var(--gold-ink); background:var(--gold-grad); }
.stepper button:active{ filter:brightness(.92); }
.stepper .val{ min-width:44px; text-align:center; font:700 15px/34px "Space Mono"; color:#4A3312; background:var(--cream2); }

/* ── Лестница титулов ── */
.ladder{ display:flex; flex-direction:column; gap:2px; }
.lrow{ display:flex; align-items:center; gap:13px; padding:11px 6px; border-radius:12px; }
.lrow:nth-child(odd){ background:rgba(0,0,0,.16); }
.lseal{ width:38px; height:38px; flex:0 0 auto; display:grid; place-items:center; clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  background:var(--gold-grad); color:var(--gold-ink); font:800 15px/1 "Space Mono"; box-shadow:0 0 16px rgba(255,190,74,.35), inset 0 2px 0 rgba(255,255,255,.5); }
.lrow b{ font:800 15.5px/1.1 "Rubik"; color:var(--paper); flex:1; }
.lrow .req{ font:700 11.5px/1 "Space Mono"; color:#FFD98A; } .lrow .perk{ color:var(--txt-2); font-size:13px; flex-basis:100%; margin-left:51px; }

/* ── Loop-схема обзора ── */
.loop{ display:flex; flex-wrap:wrap; gap:12px; margin:6px 0; }
.loop__step{ flex:1 1 155px; position:relative; background:var(--wood-grad); border:1px solid var(--line-2); border-radius:15px; padding:14px 15px; box-shadow:var(--sh-card); }
.loop__step .n{ display:inline-grid; place-items:center; width:26px; height:26px; border-radius:50%; background:var(--gold-grad); color:var(--gold-ink); font:800 12px/1 "Space Mono"; box-shadow:inset 0 2px 0 rgba(255,255,255,.5); }
.loop__step b{ display:block; font:800 14.5px/1.3 "Rubik"; color:#FFF0CE; margin:8px 0 3px; } .loop__step span{ font-size:13px; color:var(--txt); }
.loop__step::after{ content:"→"; position:absolute; right:-13px; top:50%; transform:translateY(-50%); color:var(--gold); font:900 18px/1 "Rubik"; z-index:2; text-shadow:0 0 8px rgba(255,190,74,.6); }
.loop__step:last-child::after{ display:none; }

.note{ font:600 italic 13.5px/1.55 "Rubik"; color:var(--txt-3); margin-top:10px; padding-left:12px; border-left:3px solid var(--line-2); }
.foot{ text-align:center; margin:46px 0 0; color:var(--txt-3); font:600 12px/1.6 "Manrope"; }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <span class="hero__eyebrow">Южноморск · 1994</span>
    <h1 class="hero__title" id="h-title">СЕМЬЯ</h1>
    <p class="hero__sub" id="h-sub">Мафия-монополия, где кубик — это твой прожитый день.</p>
    <div class="hero__neon">Дисциплина = власть</div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
  <div class="foot">СЕМЬЯ · как играем · <span id="foot-date"></span></div>
</div>

<script src="design-data.js"></script>
<script>
/* ══════ ДАННЫЕ (из design-data.js), иначе плейсхолдер ══════ */
const BIBLE = window.__BIBLE__ || { title:"СЕМЬЯ", pitch:"Данные ещё готовятся…", setup:[], resources:[], board_loop:{order:[],pass_start:""}, special_tiles:[], district_groups:[], day_flow:[], week_flow:[], streaks:[], chest_tiers:[], event_cards:[], build_ladder:[], set_trade_rules:[], pvp_rules:[], win_condition:{formula:"",detail:""}, titles:[], omerta_weekly:[], lore:[], balance_numbers:[], onboarding:[], glossary:[], why_it_works:[] };

const GROUP_COLORS=["#FFC24B","#FF4D4D","#49B6F0","#B466F0","#5BC66A","#F0872E","#FF57A5","#9C8154"];
const $=(s,r=document)=>r.querySelector(s); const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

/* район → id арт-файла */
const NAME2ART=[["порт","port"],["цум","tsum"],["толчок","rynok"],["рынок","rynok"],["госбанк","bank"],["банк","bank"],["космос","cosmos"],["казино","cosmos"],["гараж","avto"],["малина","club"],["клуб","club"],["азс","azs"],["заправ","azs"],["ломбард","lombard"],["промзон","sklad"],["склад","sklad"],["вокзал","vokzal"],["телеграф","telegraf"],["интурист","hotel"],["отель","hotel"],["верф","verf"]];
function artFor(name){ const l=(name||"").toLowerCase(); for(const [k,v] of NAME2ART) if(l.includes(k)) return `assets/art/districts/${v}-tile-t.png`; return null; }
const SPECIAL_IC={ "старт":"🏁","общак":"🏁","касса":"🏁","сундук":"🎁","облава":"🚨","милиц":"🚨","стрелка":"🥊","разборк":"🥊","бой":"🥊","контрабанд":"⚓","аукцион":"⚓","босс":"🎩","смотрящ":"🎩","кпз":"🚔","обезьянник":"🚔","тюрьм":"🚔","случай":"🃏","малява":"🃏","шанс":"🃏","судьб":"🃏","голодан":"🍽️","пост":"🍽️","разгруз":"🍽️" };
function specialIcon(name){ const l=(name||"").toLowerCase(); for(const k in SPECIAL_IC) if(l.includes(k)) return SPECIAL_IC[k]; return "🏙️"; }
function isSpecial(name){ return (BIBLE.special_tiles||[]).some(t=>t.name===name); }
function groupColorFor(name){ const gi=(BIBLE.district_groups||[]).findIndex(g=>(g.districts||[]).some(d=>d&&name&&(name.includes(d)||d.includes(name)))); return gi>=0?GROUP_COLORS[gi%GROUP_COLORS.length]:null; }

function tableHTML(t){ if(!t||!t.columns) return "";
  return `<div class="tbl-wrap"><table>${t.title?`<caption>${esc(t.title)}</caption>`:""}
    <thead><tr>${t.columns.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead>
    <tbody>${(t.rows||[]).map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`; }

/* ── ДОСКА ── */
function boardHTML(){
  const order=(BIBLE.board_loop&&BIBLE.board_loop.order)||[]; const n=order.length;
  if(!n) return `<p class="lead">Поле собирается…</p>`;
  const cols=Math.max(3,Math.ceil(n/4)+1);
  const cells=[]; for(let c=1;c<=cols;c++)cells.push([1,c]); for(let r=2;r<=cols;r++)cells.push([r,cols]);
  for(let c=cols-1;c>=1;c--)cells.push([cols,c]); for(let r=cols-1;r>=2;r--)cells.push([r,1]);
  const P=cells.length; let tiles="";
  for(let i=0;i<n;i++){
    const [rr,cc]=cells[Math.round(i*P/n)%P]; const name=order[i];
    const sp=isSpecial(name); const gc=groupColorFor(name); const l=(name||"").toLowerCase();
    const start=l.includes("старт")||l.includes("общак")||l.includes("касса");
    const art=(!sp&&!start)?artFor(name):null;
    const body= art ? `<img class="bart" src="${art}" alt="" loading="lazy">` : `<span class="bic">${specialIcon(name)}</span>`;
    tiles+=`<div class="btile ${sp?'special':''} ${start?'start':''}" ${gc?`data-g="1" style="grid-row:${rr};grid-column:${cc};--gc:${gc}"`:`style="grid-row:${rr};grid-column:${cc}"`}>
      <span class="bnum">${i+1}</span>${body}<span class="bn">${esc(name)}</span></div>`;
  }
  const center=`<div class="board__center"><img src="assets/crest-semya.png" alt=""><div class="bc-t">СЕМЬЯ</div><div class="bc-s">${esc(BIBLE.board_loop.pass_start||"Прошёл круг — собрал деньги с города.")}</div></div>`;
  const legend=(BIBLE.district_groups||[]).map((g,i)=>`<b style="color:${GROUP_COLORS[i%GROUP_COLORS.length]}"><i></i><span style="color:var(--txt)">${esc(g.group)}</span></b>`).join("")+`<b style="color:var(--line-2)"><i></i><span style="color:var(--txt)">Особые клетки</span></b>`;
  return `<div class="boardwrap"><div class="board" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${cols},1fr)">${tiles}${center}</div></div><div class="legend">${legend}</div>`;
}

/* ── ТАБЫ ── */
const TABS=[
  { id:"obzor", ic:"🎩", name:"Обзор", render:renderObzor },
  { id:"setup", ic:"📝", name:"Старт", render:renderSetup },
  { id:"res",   ic:"💰", name:"Что копим", render:renderRes },
  { id:"board", ic:"🗺", name:"Поле", render:renderBoard },
  { id:"day",   ic:"🎲", name:"Твой день", render:renderDay },
  { id:"week",  ic:"📅", name:"Неделя", render:renderWeek },
  { id:"chest", ic:"🎁", name:"Серии·Сундуки", render:renderChest },
  { id:"build", ic:"🏗", name:"Стройка·Обмен", render:renderBuild },
  { id:"pvp",   ic:"🥊", name:"Бой·Финал", render:renderPvp },
  { id:"lore",  ic:"📖", name:"Мир·Слова", render:renderLore },
];

function renderObzor(){
  const loop=(BIBLE.loop&&BIBLE.loop.length?BIBLE.loop:[
    {b:"Проживи день",s:"Честно отметил свои дела — получил ходы. Серия дней их множит."},
    {b:"Выйди в город",s:"Двигаешь фишку по кругу на столько шагов, сколько дал день."},
    {b:"Клетка решает",s:"Куда встал — то и делаешь: купить район, заплатить, тянуть карту, бить босса."},
    {b:"Собирай город",s:"Собрал цвет — строишь, постой дороже. Не хватает района — меняешься."},
    {b:"Финал",s:"Отжимаешь районы у соперника. За 30 дней — у кого город больше, тот и выиграл."},
  ]);
  return `<p class="lead">${esc(BIBLE.pitch)}</p>
  <div class="sh">Как идёт игра<div class="f"></div></div>
  <div class="loop">${loop.map((x,i)=>`<div class="loop__step"><span class="n">${i+1}</span><b>${esc(x.b)}</b><span>${esc(x.s)}</span></div>`).join("")}</div>
  <div class="sh">Почему это цепляет<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.why_it_works||[]).map(w=>`<div class="card"><p>${esc(w)}</p></div>`).join("")||'<div class="card"><p>—</p></div>'}</div>`;
}
function renderSetup(){
  const items=(BIBLE.setup_items||[]);
  return `<p class="lead"><b>Перед стартом каждый собирает свой протокол.</b> Выбираешь свои привычки и ставишь, сколько раз — плюсиками. Нажал «Погнали» — и это <b>зафиксировано на все 30 дней</b>. У тебя и соперника наборы могут быть разными: игра считает твой честный процент от <b>твоего</b> протокола.</p>
  <div class="sh">Собери свой протокол<div class="f"></div></div>
  <div class="proto-list">${items.map(it=>`<div class="proto-item">
    ${it.icon?`<img class="picn" src="assets/art/icons/${it.icon}-t.png" alt="">`:`<span style="font-size:26px">${esc(it.emoji||"◆")}</span>`}
    <div class="pi-t"><b>${esc(it.name)}</b><span>${esc(it.hint||"")}</span></div>
    <div class="stepper" data-def="${it.def||1}"><button class="dec">–</button><span class="val">${it.def||1}</span><button class="inc">+</button></div>
  </div>`).join("")}</div>
  <p class="note">Это демо-набор. Реальный список и единицы (раз/день, раз/неделю, литры, минуты) настраиваются под каждого. Фиксируется договором — зафиксировал, держи слово.</p>`;
}
function renderRes(){
  return `<p class="lead">Три вещи, что мы копим. У каждой — <b>своя роль</b>, поэтому нельзя просто «накопить денег и всё скупить».</p>
  <div class="grid g2">${(BIBLE.resources||[]).map(r=>`<div class="card"><div class="resc">
    <div class="resc__ic">${r.icon?`<img src="assets/art/icons/${r.icon}-t.png" alt="">`:esc(r.emoji||"◆")}</div>
    <div><h4>${esc(r.name)}</h4><p>${esc(r.role)}</p><div class="kv"><span class="pill green">+ ${esc(r.earn)}</span><span class="pill rose">− ${esc(r.spend)}</span></div></div>
  </div></div>`).join("")}</div>`;
}
function renderBoard(){
  return `<p class="lead">Город — <b>круг из клеток</b>. Фишка идёт по нему на ходы, что дал день. Куда встал — там и играешь.</p>
  ${boardHTML()}
  <div class="sh">Особые клетки<div class="f"></div></div>
  <div class="grid g3">${(BIBLE.special_tiles||[]).map(t=>`<div class="card"><div class="tagrow">${specialIcon(t.name)} ${esc(t.type)}</div><h4>${esc(t.name)}</h4><p>${esc(t.effect)}</p>${t.lore?`<p class="note">${esc(t.lore)}</p>`:""}</div>`).join("")}</div>
  <div class="sh">Цвета города (наборы)<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.district_groups||[]).map((g,i)=>`<div class="card" style="border-left:5px solid ${GROUP_COLORS[i%GROUP_COLORS.length]}"><h4>${esc(g.group)}</h4><p>${(g.districts||[]).map(esc).join(" · ")}</p><div class="kv"><span class="pill">Собрал всё: ${esc(g.set_bonus)}</span></div></div>`).join("")}</div>`;
}
function renderDay(){ return `<p class="lead">Один твой день — от честной галочки до хода по городу.</p>
  <div class="tl">${(BIBLE.day_flow||[]).map((x,i)=>`<div class="tl__row"><div class="tl__dot">${i+1}</div><div class="tl__b"><b>${esc(x.step)}</b><span>${esc(x.detail)}</span></div></div>`).join("")}</div>`; }
function renderWeek(){ return `<p class="lead">Неделя задаёт ритм: <b>слово в понедельник</b>, разгрузочный день, обмен, итог в воскресенье.</p>
  <div class="tl">${(BIBLE.week_flow||[]).map(x=>`<div class="tl__row"><div class="tl__dot">${esc((x.day||"").slice(0,2))}</div><div class="tl__b"><b>${esc(x.event)}</b><span>${esc(x.detail)}</span></div></div>`).join("")}</div>
  <div class="sh">Слово недели<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.omerta_weekly||[]).map(o=>`<div class="card card--paper"><h4>${esc(o.aspect)}</h4><p>${esc(o.detail)}</p></div>`).join("")}</div>`; }
function renderChest(){
  const cls=t=>{const l=(t.tier||"").toLowerCase(); return l.includes("золот")?"gold":l.includes("серебр")?"silver":"bronze";};
  return `<p class="lead">Серия дней — <b>множитель</b>. Сундуки — <b>приятный рандом</b>: держишь режим — ловишь редкий джекпот.</p>
  <div class="sh">Серия дней = множитель<div class="f"></div></div>
  <div class="grid g3">${(BIBLE.streaks||[]).map(s=>`<div class="card"><h4>🔥 ${esc(s.streak)}</h4><p>${esc(s.effect)}</p></div>`).join("")}</div>
  <div class="sh">Сундуки и что внутри<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.chest_tiers||[]).map(t=>`<div class="chest ${cls(t)}"><h4>🎁 ${esc(t.tier)}</h4><p style="color:var(--txt-2)">Когда: ${esc(t.trigger)}</p><ul class="loot">${(t.loot||[]).map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`).join("")}</div>
  <div class="sh">Карты случая<div class="f"></div></div>
  <div class="grid g3">${(BIBLE.event_cards||[]).map(c=>`<div class="card"><div class="tagrow">🃏 ${esc(c.kind||"случай")}</div><h4>${esc(c.name)}</h4><p>${esc(c.effect)}</p></div>`).join("")}</div>`;
}
function renderBuild(){ return `<p class="lead">Собрал цвет — <b>строишь</b>: от ларька до отеля. Каждый уровень — дороже постой. Нет нужного района — <b>меняешься</b>.</p>
  <div class="sh">Что можно построить<div class="f"></div></div>
  <div class="grid g3">${(BIBLE.build_ladder||[]).map(b=>`<div class="card"><div class="tagrow">ур. ${esc(b.level)}</div><h4>${esc(b.name)}</h4><p>${esc(b.effect)}</p><div class="kv"><span class="pill">${esc(b.cost)}</span></div></div>`).join("")}</div>
  <div class="sh">Наборы и обмен<div class="f"></div></div>
  <div class="card card--paper"><ul class="loot">${(BIBLE.set_trade_rules||[]).map(r=>`<li>${esc(r)}</li>`).join("")}</ul></div>`; }
function renderPvp(){ return `<p class="lead">Город делят два клана. Встал на чужой район — <b>платишь за постой</b>. Хочешь отжать — <b>бой (стрелка)</b>. 30 дней — <b>финал</b>.</p>
  <div class="sh">Как бьёмся<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.pvp_rules||[]).map(p=>`<div class="card"><h4>${esc(p.name)}</h4><p>${esc(p.rule)}</p></div>`).join("")}</div>
  <div class="sh">Кто победил<div class="f"></div></div>
  <div class="card card--gold"><h4>🏆 Финал (сходка)</h4><p style="font-family:'Space Mono';font-weight:700">${esc(BIBLE.win_condition&&BIBLE.win_condition.formula)}</p><p style="margin-top:8px">${esc(BIBLE.win_condition&&BIBLE.win_condition.detail)}</p></div>
  <div class="sh">Звания<div class="f"></div></div>
  <div class="card"><div class="ladder">${(BIBLE.titles||[]).map((t,i)=>`<div class="lrow"><div class="lseal">${i+1}</div><b>${esc(t.title)}</b><span class="req">${esc(t.req)}</span><span class="perk">${esc(t.perk)}</span></div>`).join("")}</div></div>`; }
function renderLore(){ return `<div class="sh">Мир Южноморска<div class="f"></div></div>
  <div class="grid g2">${(BIBLE.lore||[]).map(l=>`<div class="card card--paper"><p>${esc(l)}</p></div>`).join("")}</div>
  <div class="sh">Первые 7 дней<div class="f"></div></div>
  <div class="tl">${(BIBLE.onboarding||[]).map(o=>`<div class="tl__row"><div class="tl__dot">${esc((o.day||"").replace(/\\D/g,"")||"•")}</div><div class="tl__b"><b>${esc(o.day)}</b><span>${esc(o.unlocks)}</span></div></div>`).join("")}</div>
  <div class="sh">Ключевые числа<div class="f"></div></div>
  ${tableHTML({title:"Баланс на 30 дней",columns:["Что","Сколько","Заметка"],rows:(BIBLE.balance_numbers||[]).map(b=>[b.metric,b.value,b.note||""])})}
  <div class="sh">Словарик<div class="f"></div></div>
  <div class="grid g3">${(BIBLE.glossary||[]).map(g=>`<div class="card"><h4>${esc(g.term)}</h4><p>${esc(g.meaning)}</p></div>`).join("")}</div>`; }

/* ── БУТ ── */
function activate(id){ $$(".tab").forEach(x=>x.classList.toggle("on",x.dataset.id===id)); $$(".panel").forEach(p=>p.classList.toggle("on",p.id==="p-"+id)); try{history.replaceState(null,"","?tab="+id);}catch(e){} }
function boot(){
  $("#h-title").textContent=BIBLE.title||"СЕМЬЯ"; if(BIBLE.pitch_short)$("#h-sub").textContent=BIBLE.pitch_short; $("#foot-date").textContent="2026-07-15";
  const want=new URLSearchParams(location.search).get("tab"); const start=TABS.some(t=>t.id===want)?want:TABS[0].id;
  const tabsEl=$("#tabs"), main=$("#main");
  TABS.forEach(t=>{ const on=t.id===start;
    const b=document.createElement("button"); b.className="tab"+(on?" on":""); b.dataset.id=t.id; b.innerHTML=`<span class="ic">${t.ic}</span>${t.name}`;
    b.onclick=()=>{ activate(t.id); window.scrollTo({top:0,behavior:"smooth"}); }; tabsEl.appendChild(b);
    const sec=document.createElement("section"); sec.className="panel"+(on?" on":""); sec.id="p-"+t.id; sec.innerHTML=t.render(); main.appendChild(sec); });
  // степперы
  main.addEventListener("click",e=>{ const b=e.target.closest(".stepper button"); if(!b)return;
    const st=b.closest(".stepper"), v=st.querySelector(".val"); let n=parseInt(v.textContent)||0;
    n += b.classList.contains("inc")?1:-1; n=Math.max(0,Math.min(14,n)); v.textContent=n; });
}
boot();
</script>
