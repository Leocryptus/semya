<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0D0B08">
  <title>СЕМЬЯ · Южноморск 1994</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,700&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Загрузочный сплэш -->
  <div id="splash">
    <div>
      <div class="crest"><img src="assets/crest-semya.png" alt=""></div>
      <h1>СЕМЬЯ</h1>
      <p id="splash-quote">Собираем Семью…</p>
      <div class="spin"></div>
    </div>
  </div>

  <div id="app">
    <!-- Шапка (персонализирована под клан) -->
    <header class="top">
      <div class="between">
        <div class="top__brand">
          <div class="top__crest" id="top-crest"></div>
          <div class="top__clan">
            <b id="top-name">—</b>
            <span id="top-side">—</span>
          </div>
        </div>
        <div class="top__day">
          <b id="top-day">—</b>
          <span id="top-week">—</span>
        </div>
      </div>
      <div class="top__chips" id="top-chips"></div>
      <div class="top__strip" id="top-strip"></div>
    </header>

    <!-- Экран (свапается JS) -->
    <main id="screen"></main>

    <!-- Нижняя навигация -->
    <nav class="nav" id="nav"></nav>
  </div>

  <!-- Транзиент-тосты -->
  <div id="toaster"></div>
  <!-- Контейнер нижних листов / модалок -->
  <div id="sheet-root"></div>

  <script src="state.js"></script>
  <script src="app.js"></script>
</body>
</html>
